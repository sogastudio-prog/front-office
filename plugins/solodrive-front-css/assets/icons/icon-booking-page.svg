<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#121b36" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- phone body -->
  <rect x="6" y="2" width="12" height="20" rx="2"/>
  <!-- speaker notch -->
  <line x1="9.5" y1="5" x2="14.5" y2="5"/>
  <!-- form line 1 -->
  <line x1="9" y1="10" x2="15" y2="10"/>
  <!-- form line 2 (shorter) -->
  <line x1="9" y1="13" x2="13.5" y2="13"/>
  <!-- form line 3 (shortest) -->
  <line x1="9" y1="16" x2="12" y2="16"/>
</svg>
