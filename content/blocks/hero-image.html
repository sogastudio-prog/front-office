<section class="sd-hero">
  <div class="sd-hero__content">
    <p class="sd-eyebrow">{{eyebrow}}</p>
    <h1 class="sd-hero__heading">{{heading}}</h1>
    <p class="sd-hero__body">{{body}}</p>
    <a class="sd-button" href="{{cta_url}}">{{cta_text}}</a>
  </div>
  <div class="sd-hero__image">
    <img src="{{image_url}}" alt="{{image_alt}}" width="{{width}}" height="{{height}}" loading="eager" />
  </div>
</section>
